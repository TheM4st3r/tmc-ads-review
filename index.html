// ============ ESCAPE HTML (security) ============
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Render a script block with AUDIO lines highlighted.
function renderScriptBlock(script) {
  const lines = script.split('\n');
  const out = [];
  for (const raw of lines) {
    const line = raw;
    const escaped = escapeHtml(line);
    // Scene header: **[00:00 – 00:02] HOOK — ...** or **HEADLINE...**
    if (/^\*\*\[?\d?\d?:?\d?\d?.*\*\*$/.test(line.trim()) || /^\*\*[A-ZÁÉÍÓÚ][^*]+\*\*$/.test(line.trim())) {
      out.push(`<span class="scene-header">${escaped.replace(/\*\*/g, '')}</span>`);
      continue;
    }
    // AUDIO line
    if (/^AUDIO(\s*\([^)]+\))?:/i.test(line)) {
      out.push(`<span class="audio-line">🎙 ${escaped}</span>`);
      continue;
    }
    // VISUAL
    if (/^VISUAL:/i.test(line)) {
      out.push(`<span class="visual-line">🎬 ${escaped}</span>`);
      continue;
    }
    // SFX
    if (/^SFX:/i.test(line)) {
      out.push(`<span class="sfx-line">🔊 ${escaped}</span>`);
      continue;
    }
    // CAPTION
    if (/^CAPTION:/i.test(line)) {
      out.push(`<span class="caption-line">💬 ${escaped}</span>`);
      continue;
    }
    // default
    out.push(escaped);
  }
  return out.join('\n');
}

**PRIMARY TEXT (long-form native copy):**

I found out what was wrong with my husband by holding one of his shirts up to the bathroom light.

It was a Sunday. I was doing laundry — folding the stack that had been sitting on the dryer for three days because I'd been working late and he'd been, well, I didn't really know what he'd been doing.

I picked up his white oxford. The one he wore to my father's funeral. The one I ironed for him every week for six years.

I held it up to see if it needed another press before I hung it.

That's when I saw it.

The fabric had taken the shape of him. Two soft rounded outlines pressed into the cotton across the chest. Not pec-shaped. Not the sharp line of muscle. Something else. Something softer. Something that belonged to a different kind of body.

I sat down on the edge of the tub with the shirt in my lap.

I cried for about twenty minutes before I folded it back up and put it in the closet.

---

My husband is 44. We've been married for seventeen years. I met him when he was 27 and he had the kind of shoulders that made me stand up straighter when he walked into a room.

He was never vain. He was confident. There's a difference.

He used to come out of the shower with a towel around his waist and nothing else, and he'd stand in the bedroom talking to me while he brushed his teeth. Shirt off. Lights on. Totally at home in his own skin.

I don't remember when that stopped.

It wasn't a day I can point to. It was a slow disappearance. First the lights started being off when he undressed. Then the undershirt stayed on when we went to bed. Then the door to the bathroom got closed all the way when he showered. Then he'd come to bed with a t-shirt on, and pajama pants, and it wasn't a cold night.

---

He stopped kissing me with his shirt off sometime around last spring.

We'd be on the couch watching something after the kids were asleep, and I'd reach for him, and he'd turn sideways. He'd put his arm over his chest. He'd hold me at an angle where my hand couldn't rest flat on him.

The last time he let me kiss him shirtless was my birthday in May. He had three glasses of wine and the lights were low and something about it felt like he was giving me a gift I wasn't supposed to ask for again.

I thought it was me. I thought I'd gained weight. I thought I'd gotten old in a way he wasn't attracted to anymore.

I bought new lingerie. It stayed in the drawer with the tags on until August.

I went to my best friend Maria one night in the backyard after half a bottle of wine and I said, "I think my husband doesn't want me anymore."

Maria asked if he was sleeping with someone else.

I said, "Honestly? I wish it was that. At least then I'd understand what's wrong with me."

---

After the shirt on the laundry day, I put the pieces together.

The way he'd declined the invitation to my sister's pool party three weeks in a row.

The way he'd switched from his usual blue Saturday shirt to a series of loose black ones.

The way he'd started walking behind me at the beach instead of beside me.

The way he'd started taking his coffee into the garage to drink it alone instead of sitting at the kitchen island with his shirt and pajama pants the way he used to.

He wasn't avoiding me.

He was hiding his body.

---

I waited until Tuesday night. The kids were in bed. He was reading on the couch, still in the same charcoal hoodie he'd been wearing for twelve hours.

I sat down next to him and I put my hand on his chest. On top of the hoodie. Just the weight of my palm.

I said, "Baby. Something is happening. I see it. I want to help you figure out what it is."

He didn't say anything for about two minutes.

Then he said, "I don't have the same body anymore. I don't know what happened. I can't fix it. I'm ashamed and I don't want you to have to see it."

I said, "Take me to the doctor with you. Please."

---

The doctor was an endocrinologist. He was around our age. He didn't make it awkward.

He did the physical exam. He pulled up the bloodwork he'd ordered two days earlier.

He said, "Your total testosterone is 402. That's in the 'normal' range if you Google the number, but it's not great for your age. What's more relevant is your estradiol. It's 51. That's high-normal for a man."

He drew a diagram on a piece of paper.

Testosterone → Aromatase enzyme → Estradiol.

He said, "You have a hormonal conversion problem. Not a testosterone deficiency. The tissue in your abdomen is producing an enzyme called aromatase that's converting your testosterone into estrogen. The more fat there is, the more enzyme there is. The more enzyme, the more conversion. The more estrogen, the more feminized tissue you're going to build on your chest."

My husband nodded slowly.

The doctor said, "This isn't a gym problem. This is a biochemistry problem. Most men in your age range are in some version of this loop and they don't know. Their doctors see the 'normal' T number and wave them off. Nobody checks the estradiol. Nobody explains the aromatase pathway."

I asked what could break the loop.

The doctor said, "You have to inhibit the enzyme. You can do it with a pharmaceutical aromatase inhibitor, but that comes with side effects. Or you can do it with the correct dietary cofactors — zinc glycinate, ashwagandha KSM-66 to lower the cortisol that feeds the enzyme, Shilajit to raise free testosterone. All of those are well-documented."

He wrote the names down on the back of his card.

---

On the way home in the car, neither of us said anything for ten miles.

Then my husband said, "I thought it was me. I thought I was just getting old. I thought this was something I was supposed to accept."

I said, "Let's try the supplements."

---

I did the research that night. I went deep. I read the papers on KSM-66 Ashwagandha and the 27.9% cortisol reduction study. I read about zinc as an aromatase cofactor. I read about Shilajit's effect on free testosterone in older men.

Most of the supplements I found were garbage — underdosed, proprietary-blend, cheap synthetic knockoffs of the clinical extracts.

I found one product that had all of it in one place. Clinical doses. Named extracts. Organic. Made in Colorado.

It was a coffee. Balls & Brains.

Not a pill. Not a powder. A coffee he could drink in the morning instead of his usual Starbucks.

I ordered it. It came three days later.

He started drinking it the Monday after.

---

Week two, he was sleeping through the night for the first time in a year.

Week four, he came out of the shower and got dressed in the bedroom with the lights on. He didn't realize what he'd done until he was already in his socks.

Week seven, he put on a white t-shirt to help me carry groceries from the car.

Week ten, on a Saturday in September, we were in our bathroom together and I reached for him and he didn't turn sideways.

He let me kiss him with his shirt off for the first time in sixteen months.

He stood in the light.

I cried quietly against his collarbone and he held my face in both of his hands and he said, "There you are."

I wanted to say the same thing back to him.

---

I'm writing this for the women who are noticing what I noticed.

If your husband has started hiding his body. If he's switched to dark shirts. If he's stopped initiating intimacy. If he's started drinking his coffee in the garage. If you've found one of his shirts with the wrong kind of shape pressed into the fabric.

He's not cheating. He's not depressed in the clinical sense. He's not falling out of love with you.

His body is producing an enzyme that's feminizing him from the inside, and he doesn't have the vocabulary to explain what's happening to him, and he's too ashamed to go to a doctor alone.

You have to bring him in. You have to sit with him at the appointment. You have to let him know that you still see him and you are not going anywhere.

And then — if you want to skip the pharmaceutical route — you try the coffee.

I was 52 when I woke up at 2 AM because my feet were on fire.

Not literally on fire. But something was crawling under the skin of both feet — a prickling, buzzing, pins-and-needles sensation that wouldn't let me sleep.

I sat up on the edge of the bed and rubbed them. It didn't help.

I thought it was a pinched nerve. I'd been sitting crooked on the recliner all Sunday watching the game. That had to be it.

My grandfather lost his leg to the same "pinched nerve."

---

My name is Gary. I'm 52. I work at a dealership outside Columbus, Ohio — been there 24 years. Three kids, one grandkid on the way. Wife Linda, married 27 years this September.

I'm writing this because two months ago I thought I was going crazy, and I know there are other men my age in the same spot right now — feet tingling at night, blaming it on the mattress, blaming it on their shoes, blaming it on anything that isn't the real thing.

Here's what actually happened.

---

The tingling started in my right foot first. Only at night. Only when I was still.

I'd lie down, get comfortable, start to drift — and then somewhere in my foot, a little zapping sensation. Like static electricity under the skin. I'd flex my toes and it would ease up. I'd shift positions and it would come back.

I told Linda. She said, "You're probably sleeping on it wrong."

That's what I wanted to hear. So I believed it.

Two weeks later it was both feet.

Four weeks later I started waking up with my feet totally numb. Not tingly — numb. Like they'd been packed in ice. I'd swing my legs out of bed and put weight on them and it was like stepping onto pillows. No floor feedback. Just pressure.

I'd stumble to the bathroom and realize halfway there that I couldn't feel the tile under my feet.

Couldn't feel the tile.

I'm a guy who grew up running barefoot in the summer grass. I know what my feet are supposed to feel like.

---

I finally went to my family doc.

Dr. Mike Rourke. 60-something. Family doc for our whole family — he delivered my youngest. He's seen my grandfather, my father, and now me.

He ran a fasting glucose and an A1c.

Glucose: 118. A1c: 6.3.

He came into the exam room, sat down on the rolling stool, looked at me over his glasses, and said, "Gary, this is early diabetic neuropathy. You're not diabetic yet. But your nerves are already getting hit."

I stared at him. I didn't say anything for what felt like a minute.

I said, "My grandpa."

He said, "I know. I remember."

My grandfather's name was Walter. He was a steel welder in Youngstown. Strong as an ox until about 62, when he started losing sensation in his feet. The doctor told him it was circulation, gave him some pills, told him to walk more.

By 65 he had a small cut on his big toe that wouldn't heal.

By 67 he was using a cane.

By 68 they took the leg below the knee.

My grandmother had to help him bathe for the last five years of his life. He died angry. Couldn't forgive his own body for quitting on him.

---

I was sitting in Dr. Rourke's exam room hearing "you're not diabetic yet, BUT" — and all I could see was my grandfather's stump.

I drove home in a daze. I told Linda everything. She cried. I almost did too but I walked out to the garage instead.

That night I lay in bed and I could feel my feet tingling, and I couldn't sleep, and I thought: this is how it started for him.

This is EXACTLY how it started for him.

---

I started reading everything I could get my hands on. Diabetes forums. Endocrinology articles. Reddit threads from guys my age who'd been diagnosed pre-diabetic.

Here's what almost nobody in the doctor's office had told me:

Peripheral neuropathy — the dying of the nerves in your feet — doesn't wait for a full diabetes diagnosis. It starts YEARS before.

Any A1c over 5.7 means your blood sugar is spending too much time too high. Too much sugar in the blood attacks the tiny capillaries that feed your nerves. The nerves stop getting oxygen. They start short-circuiting. Then they start dying.

First you get tingling at night. Then numbness in the mornings. Then you stop feeling hot water on your feet in the shower. Then you get a cut on your toe and don't notice for three days. Then it gets infected. Then…

My grandfather.

---

But here's the part that wrecked me.

I kept reading and found a doctor in Texas — an endocrinologist — who was writing about this loop almost nobody talks about.

He said: men don't just get pre-diabetic because of sugar. Men get trapped in a loop with testosterone.

High insulin (which is what happens when your blood sugar is dysregulated) lowers testosterone. Low testosterone then makes insulin resistance WORSE. It's a vicious circle.

The belly gets bigger. The belly produces aromatase, which converts what little testosterone you have left into estrogen. The estrogen makes the belly grow more. The insulin stays high. The nerves keep dying.

And metformin — which is what Dr. Rourke had on the prescription pad — only does one thing. It lowers blood sugar. It doesn't touch testosterone. It doesn't touch cortisol. It doesn't touch the belly fat that's the aromatase factory.

I watched my grandfather take medication every single day for 15 years. And it didn't stop the amputation.

Because the loop was never touched.

---

That's when I stopped assuming the pill was the answer.

I called a functional medicine clinic in Cincinnati. I spent $400 on a full hormone and metabolic panel. Everything. Testosterone total, free T, SHBG, cortisol AM/PM, fasting insulin, HOMA-IR, fasting glucose, A1c, lipid panel, thyroid, inflammatory markers.

Results came back two weeks later.

Total T: 327 ng/dL. (Low end of normal for a man in his 80s.)
Free T: 5.9 pg/mL. (Below reference range.)
Fasting insulin: 14.2. (Red zone.)
Cortisol AM: 24. (Elevated.)
A1c: 6.3. (Pre-diabetes, as expected.)

The doctor on the phone said: "Gary, your insulin is high, your cortisol is high, and your testosterone is basically drained. This isn't a diabetes problem. This is a metabolic-hormonal collapse. You need to intervene on ALL of it at once or your nerves will keep dying regardless of what metformin does to your A1c."

She recommended three things. Strength training two days a week (nothing crazy — compound lifts, 45 min sessions). A lower-carb whole-foods approach. And one supplement she'd seen move the markers faster than anything else in her clinic.

A mushroom coffee stack made specifically for men.

She named it. Balls & Brains.

I laughed at the name. I thought: this woman is prescribing a joke.

But she pulled up three patient panels on her screen and walked me through the markers. Cortisol down 22%. Fasting insulin down 31%. Total T up from ~300 to ~470. A1c down from 6.1 to 5.5. In 90 days.

I ordered it that afternoon.

---

The formula has Ashwagandha (KSM-66), Tongkat Ali (LJ100), Shilajit, Zinc Glycinate, Lion's Mane, and Chaga — along with L-theanine and just 100mg of caffeine from organic Arabica.

Ashwagandha drops cortisol. Lower cortisol = lower insulin demand. Tongkat Ali re-activates testosterone production in the Leydig cells. Zinc is the co-factor for the enzymes that PREVENT testosterone from converting to estrogen in belly fat. Shilajit supports mitochondrial function and circulation.

All three mechanisms hitting the loop at once: cortisol → insulin → T → aromatase. Break any one link and the loop weakens. Break three at once and the loop collapses.

It's not magic. It's biochemistry.

---

Day 14. Tingling was less intense at night.

Day 28. I woke up one morning and put my bare feet on the cold tile and FELT THE COLD. I stood there for a full minute with tears in my eyes, just feeling the floor.

Day 45. Had my blood redrawn. Fasting insulin dropped from 14.2 to 9.8. Total T up to 412. A1c down to 5.9.

Day 72. Numbness gone. I walked three miles barefoot on the beach when we went to Hilton Head.

Day 90. Full re-test. A1c: 5.4. Total T: 487. Free T: 11.1. Fasting insulin: 6.1. Cortisol AM: 16.

My doctor called me "an outlier." I told her exactly what I'd done. She wrote it all down.

---

If you're a man in your 40s, 50s, 60s and your feet tingle at night — don't call it a pinched nerve.

Don't call it your shoes.

Don't call it your age.

Your nerves are being cooked by high blood sugar RIGHT NOW. And every day you wait, more of them die permanently.

But here's what nobody told my grandfather: the loop is breakable. The fuel line (testosterone) can be restored. The cortisol drain can be closed. The insulin can come down. And your nerves — the ones that are still alive — can come back.

My grandfather didn't have the information. He had one pill and a doctor who said "walk more."

You have more.

Balls & Brains is a men's mushroom coffee made specifically for the loop I just described. Ashwagandha for cortisol. Tongkat Ali for testosterone. Zinc for aromatase. Shilajit and Lion's Mane for mitochondrial support. Organic, made in Colorado, no sugar, 15 calories per cup.

It's not a cure. It's a targeted intervention on the three mechanisms metformin doesn't touch.

  {"id": 39, "day": 4, "dayLabel": "Quinta", "date": "23/04/26", "cluster": "Cluster 6 Joint & Knee Pain", "name": "Não Conseguir Levantar O Neto (REWRITE)", "type": "ACQ", "format": "Long-form Native Image (Format A, Male First-Person, Direct-to-Product CTA, Emotional Devastation)", "duration": "N/A (static image + long copy)", "tag": "acq-native", pt: `**HEADLINE (Meta Ads):** my grandson asked for a hug and I froze in the middle of the room

**COPY (primary text):**

My 2-year-old grandson came running across the living room asking to be picked up.

I froze halfway down. Hand on my knee. Teeth clenched so I wouldn't scream in front of him.

He stopped smiling.

He stood there with his arms up, waiting, confused. And I watched his face go from joy to something smaller. Something that looked a lot like "why won't grandpa pick me up?"

That was the moment I knew I was losing him.

---

I'm Frank. Fifty-seven. Retired plumber out of Cleveland. Thirty-eight years crawling under sinks, folded inside crawl spaces, kneeling on concrete with nothing but a canvas pad. My knees earned every bit of what they give me now.

But what happened that afternoon wasn't the knees I recognized.

It was something else.

I've had knee pain for a decade. I know the shape of it. The stairs thing. The getting-out-of-the-truck thing. The stand-up-after-sitting-too-long thing. I know how to manage all of that.

What I didn't know was how to tell a 2-year-old "grandpa can't."

So I didn't. I just said "one second, buddy" and slowly — slowly — lowered myself to the rug on both knees, which made a sound like wet bubble wrap, and held my arms out and let HIM climb onto ME instead of the other way around.

He was fine after. He always is. Kids forget.

But I didn't.

---

My son called that night. He didn't know about the hug moment. He was just checking in.

I said everything was great. I lied.

Because the truth was I'd been lying to everyone for about four years.

I stopped playing catch with him back in 2022. Told him my shoulder. It wasn't the shoulder. It was my right knee locking every time I tried to squat into a throwing position.

I stopped dancing with my wife at our younger son's wedding in 2023. Told her my back. It wasn't the back. It was the same knee, plus the left one starting up too.

I stopped walking the dog last fall. Three flights down, three flights back up, twice a day — I told my wife Pete could do with the backyard instead. The dog, who's an 8-year-old lab named Pete, has been pacing by the front door every morning since November.

I stopped. That was the pattern. Everything I loved, I quietly stopped.

And then my grandson ran at me with his arms up.

---

I'd been to an orthopedist two years ago. Dr. Brennan, at the clinic off Euclid. Good guy. Told me what every orthopedist tells every man over fifty-five.

"Frank, it's arthritis. It's age. The cartilage is wearing down. Here's a cortisone shot. Here's a prescription for anti-inflammatories. Here's a pamphlet about knee replacement for when it gets bad enough."

The cortisone worked for six weeks.

Then it stopped. Then the knee got worse than before.

The anti-inflammatories gave me stomach pain and didn't touch the real issue.

I didn't go back. I figured I'd just manage it. That's what men my age do. We manage.

---

It was my wife who pushed me. After the hug thing. She'd been watching my face at dinner and she said, "Frank, you looked like you were going to cry when he put his arms up."

I hadn't told her. She saw it anyway.

She made me an appointment with a different doctor. A younger one. Someone at the university hospital who took a sports medicine angle. I went because she made me.

His name was Dr. Okafor. Forty-something. Lean. Asked me questions no orthopedist had ever asked me.

He asked about my sleep. He asked about my stress. He asked if I'd been waking up at 3 AM, heart pounding. He asked if I'd been carrying any extra weight around the belly that I didn't use to carry. He asked if my hands sometimes felt stiff in the morning, not just my knees.

Yes to all of it.

He pulled up a diagram on his laptop. "Frank, I don't think this is the arthritis they told you it is. At least not primarily. I think you've got a cortisol problem."

"A what?"

---

He explained it slowly. I'm going to try to say it the way he said it to me, because it finally made sense after a decade of nothing making sense.

Cortisol is your stress hormone. Your body makes it. Everybody has it. After about forty, the regulation of that hormone starts to fall apart for a lot of men. You're making too much of it, at the wrong times, and it doesn't come down at night like it should.

Chronic high cortisol does a few things to a joint.

It thickens your synovial fluid — that's the lubrication inside the knee capsule. When it thickens, you don't absorb shock right. Every step is slightly grinding instead of gliding.

It dries out your cartilage — strips the proteins that keep the tissue elastic and hydrated.

It activates enzymes inside the joint that actively DIGEST cartilage. Not passive wear. Active destruction.

And it suppresses the repair systems that are supposed to rebuild what you're losing.

"So the arthritis pamphlet they gave you," he said, "is treating the end of the story. Nobody's been treating the cause. You've been walking around with a joint that's being chemically eaten for probably the last six to ten years."

I sat there and looked at the diagram and I thought, *there it is. That's what's been happening to me.*

---

Then he said the thing that changed it.

"The fix isn't a cortisone shot. The shot masks pain for six weeks and then makes the cartilage situation worse. The fix isn't knee replacement either — not yet. The fix is lowering your baseline cortisol so the joint can actually recover. There's a specific adaptogenic compound called Ashwagandha, a full-spectrum extract at clinical dose, that's been shown to drop cortisol by around 27.9 percent in 60 days in men your age. That's the front door. Then you stack antioxidants to protect what cartilage you've got left, and you improve circulation so nutrients can actually reach the joint capsule."

He didn't sell me anything. He handed me a card.

"I drink this every morning," he said. "It's the simplest way I know to get all three things — the cortisol work, the antioxidant, the circulation — in one shot. It's a mushroom coffee. The formula is made for men over forty. The Ashwagandha is KSM-66, clinically dosed. The Chaga is for the antioxidant layer. The Cordyceps is for circulation. You drink one cup a day instead of regular coffee. That's it."

The name made me smile. Balls & Brains. I was expecting something hospital-shaped and instead I got something that sounded like a podcast.

---

I started on a Tuesday.

Tasted like coffee. That was my first surprise — I was expecting dirt water. It was just smoother, less aggressive than the stuff I'd been drinking for thirty years. No jitters. No crash at 2pm. I noticed that part right away.

Week one I didn't notice anything in my knees. Dr. Okafor had warned me. "The cortisol drop takes a few weeks. The cartilage protection and the circulation build start underneath before you feel it."

Week two my sleep got noticeably better. Not miraculous. Just — I wasn't waking up at 3 AM tight and sweating. I was sleeping through.

Week four I walked up my front porch stairs without leaning on the rail. I didn't realize I'd been leaning on the rail every single morning until the morning I didn't.

Week six I took Pete around the block. One block. Then two.

Week ten I got down on the living room rug on both knees and I heard no sound at all. Nothing bubble-wrapped. Nothing cracked. I just got down and got back up.

Week twelve my grandson came over on a Sunday afternoon.

He ran across the living room with his arms up.

I bent down and I caught him under the armpits and I stood back up with him on my hip and I spun him once and he laughed and I laughed and my wife was in the kitchen and I heard her put a plate down hard on the counter because she'd turned to watch and she couldn't hold the plate.

She came into the living room and she looked at me with him in my arms and she didn't say anything. Her eyes were full.

I said, "There I am."

That was three months ago.

---

If you're a man in your fifties or sixties and you've been told it's arthritis and you've been told it's age and you've been told to manage it — I want you to hear this from someone who believed all of that for a decade.

It's not just arthritis.

It's not just age.

It's the cortisol eating the joint, and nobody in that orthopedist's office is going to say those words to you, because that's not the diagnosis they trained for and it's not the procedure they bill for.

You can treat it. You can reverse a good amount of it. You can pick up your grandson.

---

The product I drink every morning is called Balls & Brains mushroom coffee. It's the first mushroom coffee formulated specifically for men over forty. Ashwagandha KSM-66 at clinical dose for the cortisol work. Chaga for the antioxidant layer that protects what cartilage you've still got. Cordyceps for circulation — getting nutrients into the joint capsule. Plus Tongkat Ali, Shilajit, Zinc Glycinate, and Lion's Mane. USDA Certified Organic. Grown in Colorado. Fifteen calories a cup. Tastes like real coffee.

They run a 365-day money-back guarantee. If you don't feel a difference in three months, they refund you. I don't know how they can afford to do that, but that's between them and their accountant.

They're running 40% off right now with free shipping. Supply gets thin when they run this because they're a small-batch operation out of Colorado.

Aproveite 40% de desconto + frete grátis. Estoque limitado pra essa oferta. Garantia de 365 dias — se não funcionar, devolvemos 100% do seu dinheiro. Clique no link abaixo e garanta o seu.

— Frank K., Cleveland

P.S. If your orthopedist has never tested your cortisol, has never asked about your sleep at 3 AM, has never talked to you about synovial fluid viscosity — that's not because those things don't matter. It's because that's not the appointment you're in. You're in the procedure appointment. The cause appointment is somewhere else. It's the appointment you have to go find yourself.

P.P.S. My grandson is here right now as I'm typing this. He's on the floor building something out of blocks. Every two minutes he gets up and runs over and climbs into my lap. Every single time. I pick him up and I put him down and I pick him up again. I will never take that for granted. Not for the rest of my life. If you've got someone small who runs at you with their arms up — go see about your knees. Don't wait until the day they stop running.`, en: `**HEADLINE (Meta Ads):** my grandson asked for a hug and I froze in the middle of the room

  {"id": 40, "day": 4, "dayLabel": "Quinta", "date": "23/04/26", "cluster": "Cluster 6 Joint & Knee Pain", "name": "Filha Conta História do Pai (REWRITE)", "type": "ACQ", "format": "Long-form Native Image (Format A, Daughter Narrating Father's Journey, Direct-to-Product CTA, Emotional Devastation)", "duration": "N/A (static image + long copy)", "tag": "acq-native", pt: `**HEADLINE (Meta Ads):** my dad is 58 and couldn't stand up from a chair without pushing off the arms

**COPY (primary text):**

My dad is 58 years old and for the last three years he couldn't stand up from a chair without gripping both arms and pushing himself up like he was lifting a body.

Every ortho he saw told him the same thing.

"It's your age. It's wear and tear. Here's a cortisone shot. Here's an anti-inflammatory. Here's a referral for when we have to replace the joint."

Ten years of that.

Then he found one thing that none of them had mentioned to him. And he got his life back.

This is his story.

---

My dad's name is Ray. He's 58 now. He lives outside Tucson. For most of my life he was the most physically present man I knew. He played catcher in a city league into his early fifties. He played acoustic guitar standing up for hours — no strap, just standing there swaying with it. He built his own back porch with a framing hammer. He never sat down unless dinner was on the table.

Then when he turned 55, something started to go wrong.

It started at the ballfield. He couldn't get into full squat position behind the plate anymore. Started popping up instead of squatting. The coach moved him to first base. He said he didn't care. I could tell he cared.

By 56 he couldn't climb the ladder to clean the gutters. He called a kid from down the street. Twenty bucks. He stood in the driveway and looked up while someone half his age did the work he'd done every fall for forty years.

By 57 he couldn't play guitar standing up anymore. He started sitting for it. He used to say sitting made him feel like an old man. Then he became the old man sitting.

By 58 — and this is the part that still gets me — he couldn't stand up from his own recliner without gripping the arms and pushing himself up. My mom would look at him sometimes and try not to look at him. He'd catch her doing it and he'd laugh it off. "Just getting my warm-up," he'd say. Then he'd wince once he was standing and think nobody saw.

I saw.

---

He went to three orthopedists in that stretch.

The first one ordered an X-ray and said "mild to moderate osteoarthritis, both knees, cartilage thinning, that's what we'd expect at your age." He got a cortisone shot in the right knee. It worked for a month. It wore off. The knee got worse than before.

The second one said the same thing in different words. He ordered an MRI. Same finding. He put my dad on daily anti-inflammatories. My dad took them for six months until his stomach started bleeding and he had to quit.

The third one was the worst. This guy said "Ray, honestly, we can keep managing this, but you're heading for a bilateral knee replacement in the next three to five years. Start thinking about timing." My dad drove home and didn't talk at dinner. He told my mom later that the doctor's language was what broke him — like the knee was already gone and they were just scheduling the funeral.

He tried everything after that.

Collagen powder every morning. He bought the expensive kind.

Glucosamine chondroitin for a year. No difference.

Physical therapy twice a week for eight months. The therapist was good. But all she could do was strengthen around a joint that was still being destroyed underneath.

Topical CBD creams. Tumeric capsules. A copper knee sleeve his coworker swore by.

None of it touched the real problem.

---

What changed was something he read almost by accident.

He was watching a podcast clip on YouTube while he was icing his knees on the couch. A sports medicine doctor was being interviewed about joint pain in men over fifty, and she said one sentence that my dad paused the video on and replayed four times.

She said: "Most of these men don't have a cartilage problem. They have a cortisol problem that LOOKS like a cartilage problem. And nobody tests for it."

He wrote it down.

const STORAGE_KEY = 'tmc-scripts-review-b13-v1';
let state = {};
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) state = JSON.parse(saved);
} catch (e) { state = {}; }

let currentDay = 1;
let currentFilter = 'all';

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  updateStats();
  renderDayTabs();
}

// ============ RENDER ============
const DAY_META = [
  { day: 1, label: "Segunda", date: "20/04", cluster: "Cluster 3 Cognitive Decline" },
  { day: 2, label: "Terça", date: "21/04", cluster: "Cluster 4 Belly Fat / Man Boobs" },
  { day: 3, label: "Quarta", date: "22/04", cluster: "Cluster 4 High Blood Sugar" },
  { day: 4, label: "Quinta", date: "23/04", cluster: "Cluster 6 Joint & Knee Pain" },
  { day: 5, label: "Sexta", date: "24/04", cluster: "Cluster 1 Weak Erections" },
];

function renderDayTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  DAY_META.forEach(dm => {
    const dayAds = ADS.filter(a => a.day === dm.day);
    let approved = 0, rejected = 0, commented = 0;
    dayAds.forEach(ad => {
      const s = state[ad.id] || {};
      if (s.status === 'approved') approved++;
      if (s.status === 'rejected') rejected++;
      if (s.comment && s.comment.trim() !== '') commented++;
    });
    const tab = document.createElement('div');
    tab.className = `day-tab${dm.day === currentDay ? ' active' : ''}`;
    tab.dataset.day = dm.day;
    tab.innerHTML = `
      <div class="day-label">${escapeHtml(dm.label)}</div>
      <div class="day-date">${escapeHtml(dm.date)}</div>
      <div class="day-cluster">${escapeHtml(dm.cluster)}</div>
      <div class="day-progress">
        <span class="progress-chip chip-approved">✓ ${approved}</span>
        <span class="progress-chip chip-rejected">✗ ${rejected}</span>
        <span class="progress-chip chip-commented">💬 ${commented}</span>
      </div>
    `;
    tab.addEventListener('click', () => {
      currentDay = dm.day;
      renderDayTabs();
      renderAds();
    });
    container.appendChild(tab);
  });
}

function matchesFilter(ad) {
  const s = state[ad.id] || {};
  switch (currentFilter) {
    case 'pending': return !s.status;
    case 'approved': return s.status === 'approved';
    case 'rejected': return s.status === 'rejected';
    case 'commented': return s.comment && s.comment.trim() !== '';
    case 'override': return ad.tag === 'override';
    case 'winner-var': return ad.tag === 'winner-var';
    case 'acq-native': return ad.tag === 'acq-native';
    default: return true;
  }
}

function renderAds() {
  const container = document.getElementById('ads-container');
  container.innerHTML = '';
  const dm = DAY_META.find(d => d.day === currentDay);
  const dayAds = ADS.filter(a => a.day === currentDay).filter(matchesFilter);

  const header = document.createElement('div');
  header.className = 'day-header';
  header.innerHTML = `
    <h2>${escapeHtml(dm.label)}</h2>
    <span class="cluster-tag">${escapeHtml(dm.cluster)}</span>
    <span class="date">${escapeHtml(dm.date)}/2026</span>
  `;
  container.appendChild(header);

  if (dayAds.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'Nenhum ad bate com esse filtro nesse dia.';
    container.appendChild(empty);
    return;
  }

  dayAds.forEach(ad => container.appendChild(buildCard(ad)));
}

function buildCard(ad) {
  const s = state[ad.id] || {};
  const card = document.createElement('div');
  card.id = `ad-${ad.id}`;
  let cls = 'ad-card';
  if (s.status === 'approved') cls += ' approved';
  if (s.status === 'rejected') cls += ' rejected';
  if (s.comment && s.comment.trim() !== '' && !s.status) cls += ' has-comment';
  card.className = cls;

  const comment = s.comment || '';
  const tagLabel = {
    'winner-var': 'Winner Var',
    'override': 'Override',
    'acq-native': 'Long-form Native',
    'acq-video': 'ACQ Fill Video',
    'rtg-video': 'RTG Video',
    'rtg-image': 'RTG Image',
  }[ad.tag] || ad.tag;

  card.innerHTML = `
    <div class="ad-header">
      <span class="ad-id">AD #${ad.id}</span>
      <span class="ad-title">${escapeHtml(ad.name)}</span>
      <div class="ad-badges">
        <span class="badge type-${ad.type.toLowerCase()}">${escapeHtml(ad.type)}</span>
        <span class="badge ${ad.tag}">${escapeHtml(tagLabel)}</span>
        ${ad.format ? `<span class="badge format">${escapeHtml(ad.format)}</span>` : ''}
        ${ad.duration && ad.duration !== 'N/A (static)' && ad.duration !== 'N/A (Static image + long copy)' ? `<span class="badge duration">${escapeHtml(ad.duration)}</span>` : ''}
      </div>
    </div>
    <div class="script-columns">
      <div class="script-col pt">
        <div class="script-col-header">🇧🇷 Script PT <span style="font-weight:500;opacity:0.7;font-size:11px;">(AUDIO traduzido p/ Winner Variations)</span></div>
        <div class="script-col-body">${renderScriptBlock(ad.pt)}</div>
      </div>
      <div class="script-col en">
        <div class="script-col-header">🇺🇸 Script EN <span style="font-weight:500;opacity:0.7;font-size:11px;">(AUDIO original — US market)</span></div>
        <div class="script-col-body">${renderScriptBlock(ad.en)}</div>
      </div>
    </div>
    <div class="action-bar">
      <button class="action-btn approve${s.status === 'approved' ? ' active' : ''}" data-id="${ad.id}" data-action="approve">✓ Aprovar</button>
      <button class="action-btn reject${s.status === 'rejected' ? ' active' : ''}" data-id="${ad.id}" data-action="reject">✗ Rejeitar</button>
      <button class="action-btn comment${comment.trim() !== '' ? ' active' : ''}" data-id="${ad.id}" data-action="toggle-comment">💬 Comentário${comment.trim() !== '' ? ' ✓' : ''}</button>
      ${s.status ? `<span class="status-indicator ${s.status}">${s.status === 'approved' ? '✓ Aprovado' : '✗ Rejeitado'}</span>` : ''}
      <button class="action-btn reset" data-id="${ad.id}" data-action="reset">Limpar</button>
    </div>
    <div class="comment-box" id="comment-box-${ad.id}">
      <textarea placeholder="Ex.: 'Refaz o hook — muito genérico', 'AUDIO na linha 2 tá fraca', 'Visual não combina com copy'" data-id="${ad.id}">${escapeHtml(comment)}</textarea>
      <div class="comment-hint">Auto-save ativo. Este comentário vai pro review.md.</div>
    </div>
  `;

  card.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', handleAction));
  const ta = card.querySelector('textarea');
  if (ta) {
    ta.addEventListener('input', (e) => {
      const id = parseInt(e.target.dataset.id);
      if (!state[id]) state[id] = {};
      state[id].comment = e.target.value;
      saveState();
      updateCardVisual(id);
    });
  }

  if (comment.trim() !== '') {
    card.querySelector('.comment-box').classList.add('visible');
  }

  return card;
}

function handleAction(e) {
  const id = parseInt(e.currentTarget.dataset.id);
  const action = e.currentTarget.dataset.action;
  if (!state[id]) state[id] = {};

  switch (action) {
    case 'approve':
      state[id].status = state[id].status === 'approved' ? null : 'approved';
      if (state[id].status === null) delete state[id].status;
      break;
    case 'reject':
      state[id].status = state[id].status === 'rejected' ? null : 'rejected';
      if (state[id].status === null) delete state[id].status;
      break;
    case 'toggle-comment':
      const box = document.getElementById(`comment-box-${id}`);
      box.classList.toggle('visible');
      if (box.classList.contains('visible')) {
        setTimeout(() => box.querySelector('textarea').focus(), 50);
      }
      return;
    case 'reset':
      delete state[id];
      break;
  }

  saveState();
  updateCardVisual(id);
}

function updateCardVisual(id) {
  const card = document.getElementById(`ad-${id}`);
  if (!card) return;
  const s = state[id] || {};
  card.classList.remove('approved', 'rejected', 'has-comment');
  if (s.status === 'approved') card.classList.add('approved');
  if (s.status === 'rejected') card.classList.add('rejected');
  if (s.comment && s.comment.trim() !== '' && !s.status) card.classList.add('has-comment');

  const approveBtn = card.querySelector('[data-action="approve"]');
  const rejectBtn = card.querySelector('[data-action="reject"]');
  const commentBtn = card.querySelector('[data-action="toggle-comment"]');
  approveBtn.classList.toggle('active', s.status === 'approved');
  rejectBtn.classList.toggle('active', s.status === 'rejected');
  const hasComment = !!(s.comment && s.comment.trim() !== '');
  commentBtn.classList.toggle('active', hasComment);
  commentBtn.innerHTML = `💬 Comentário${hasComment ? ' ✓' : ''}`;

  let statusEl = card.querySelector('.status-indicator');
  if (s.status && !statusEl) {
    const resetBtn = card.querySelector('[data-action="reset"]');
    const span = document.createElement('span');
    span.className = `status-indicator ${s.status}`;
    span.textContent = s.status === 'approved' ? '✓ Aprovado' : '✗ Rejeitado';
    resetBtn.before(span);
  } else if (!s.status && statusEl) {
    statusEl.remove();
  } else if (statusEl) {
    statusEl.className = `status-indicator ${s.status}`;
    statusEl.textContent = s.status === 'approved' ? '✓ Aprovado' : '✗ Rejeitado';
  }

  if (!matchesFilter(ADS.find(a => a.id === id))) {
    setTimeout(() => renderAds(), 150);
  }
}

function updateStats() {
  let approved = 0, rejected = 0, commented = 0, pending = 0;
  ADS.forEach(ad => {
    const s = state[ad.id] || {};
    if (s.status === 'approved') approved++;
    else if (s.status === 'rejected') rejected++;
    else pending++;
    if (s.comment && s.comment.trim() !== '') commented++;
  });
  document.getElementById('count-approved').textContent = approved;
  document.getElementById('count-rejected').textContent = rejected;
  document.getElementById('count-commented').textContent = commented;
  document.getElementById('count-pending').textContent = pending;

  const reviewed = approved + rejected;
  document.getElementById('bottom-summary').textContent = `${reviewed} de 60 revisados · ${commented} com comentário`;

  document.getElementById('progress-approved').style.width = (approved / 60 * 100) + '%';
  document.getElementById('progress-rejected').style.width = (rejected / 60 * 100) + '%';
}

// ============ FILTERS ============
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAds();
  });
});

// ============ EXPORT ============
function generateMarkdown() {
  let approved = [], rejected = [], commented = [], pending = [];
  ADS.forEach(ad => {
    const s = state[ad.id] || {};
    const entry = { ad, state: s };
    if (s.status === 'approved') approved.push(entry);
    else if (s.status === 'rejected') rejected.push(entry);
    else pending.push(entry);
    if (s.comment && s.comment.trim() !== '') commented.push(entry);
  });

  const today = new Date().toISOString().split('T')[0];
  let md = `# Review Feedback — Scripts Batch B13 / Week 2026-W17\n`;
  md += `**Gerado em:** ${today}\n`;
  md += `**Status:** ${approved.length} aprovados · ${rejected.length} rejeitados · ${commented.length} com comentário · ${pending.length} pendentes\n\n`;
  md += `---\n\n`;

  if (rejected.length > 0) {
    md += `## ✗ REJEITADOS (${rejected.length})\n\n`;
    rejected.forEach(({ ad, state: s }) => {
      md += `### AD #${ad.id} — ${ad.name}\n`;
      md += `**Dia:** ${ad.dayLabel} (B13.${ad.day}) · **Tipo:** ${ad.type} · **Formato:** ${ad.format}\n`;
      if (s.comment && s.comment.trim() !== '') md += `**💬 Comentário:** ${s.comment}\n`;
      md += `\n`;
    });
    md += `---\n\n`;
  }

  const commentedNotRejected = commented.filter(e => e.state.status !== 'rejected');
  if (commentedNotRejected.length > 0) {
    md += `## 💬 COM COMENTÁRIO (aprovados + pendentes com feedback)\n\n`;
    commentedNotRejected.forEach(({ ad, state: s }) => {
      md += `### AD #${ad.id} — ${ad.name}\n`;
      md += `**Dia:** ${ad.dayLabel} (B13.${ad.day}) · **Status:** ${s.status || 'pendente'}\n`;
      md += `**💬 Comentário:** ${s.comment}\n\n`;
    });
    md += `---\n\n`;
  }

  if (approved.length > 0) {
    md += `## ✓ APROVADOS (${approved.length})\n\n`;
    approved.forEach(({ ad }) => {
      md += `- AD #${ad.id} — ${ad.name} (${ad.dayLabel})\n`;
    });
    md += `\n---\n\n`;
  }

  if (pending.length > 0) {
    md += `## ⏳ PENDENTES (${pending.length})\n\n`;
    pending.forEach(({ ad }) => {
      md += `- AD #${ad.id} — ${ad.name} (${ad.dayLabel})\n`;
    });
    md += `\n`;
  }

  return md;
}

function exportMarkdown() {
  const md = generateMarkdown();
  const today = new Date().toISOString().split('T')[0];
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `b13-scripts-review-${today}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

async function copyFeedback() {
  const md = generateMarkdown();
  try {
    await navigator.clipboard.writeText(md);
    alert('✓ Review copiado pro clipboard!');
  } catch (e) {
    alert('Erro ao copiar. Tenta baixar .md.');
  }
}

function resetAll() {
  if (!confirm('Isso vai apagar TODAS as aprovações, rejeições e comentários. Confirma?')) return;
  state = {};
  localStorage.removeItem(STORAGE_KEY);
  renderDayTabs();
  renderAds();
  updateStats();
}

// ============ INITIAL RENDER ============
renderDayTabs();
renderAds();
updateStats();
</script>

</body>
