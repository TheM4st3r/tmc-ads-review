// ============ STATE MANAGEMENT ============
const STORAGE_KEY = 'b13-briefing-review';
let state = loadState();
let currentDay = 1;
let currentFilter = 'all';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    return {};
  }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateStats();
  renderDayTabs();
}

// ============ DAY TAB RENDERING ============
const DAYS_META = [
  { day: 1, label: "Segunda", date: "20/04", cluster: "C3 Cognitive Decline" },
  { day: 2, label: "Terça", date: "21/04", cluster: "C4 Belly Fat / Man Boobs" },
  { day: 3, label: "Quarta", date: "22/04", cluster: "C4 High Blood Sugar" },
  { day: 4, label: "Quinta", date: "23/04", cluster: "C6 Joint & Knee Pain" },
  { day: 5, label: "Sexta", date: "24/04", cluster: "C1 Weak Erections" },
];

function renderDayTabs() {
  const container = document.getElementById('day-tabs');
  container.innerHTML = '';
  DAYS_META.forEach(d => {
    const dayAds = ADS.filter(a => a.day === d.day);
    let approved = 0, rejected = 0, commented = 0;
    dayAds.forEach(ad => {
      const s = state[ad.id] || {};
      if (s.status === 'approved') approved++;
      if (s.status === 'rejected') rejected++;
      if (s.comment && s.comment.trim() !== '') commented++;
    });

    const tab = document.createElement('div');
    tab.className = 'day-tab' + (currentDay === d.day ? ' active' : '');
    tab.dataset.day = d.day;
    tab.innerHTML = `
      <div class="day-label">${d.label}</div>
      <div class="day-date">B13.${d.day} · ${d.date}</div>
      <div class="day-cluster">${escapeHtml(d.cluster)}</div>
      <div class="day-progress">
        ${approved > 0 ? `<span class="progress-chip chip-approved">✓ ${approved}</span>` : ''}
        ${rejected > 0 ? `<span class="progress-chip chip-rejected">✗ ${rejected}</span>` : ''}
        ${commented > 0 ? `<span class="progress-chip chip-commented">💬 ${commented}</span>` : ''}
        ${approved === 0 && rejected === 0 && commented === 0 ? `<span class="progress-chip" style="opacity: 0.5">12 ads</span>` : ''}
      </div>
    `;
    tab.addEventListener('click', () => {
      currentDay = d.day;
      renderDayTabs();
      renderAds();
      window.scrollTo({ top: document.querySelector('.container').offsetTop - 80, behavior: 'smooth' });
    });
    container.appendChild(tab);
  });
}

// ============ AD RENDERING ============
function matchesFilter(ad) {
  const s = state[ad.id] || {};
  switch (currentFilter) {
    case 'all': return true;
    case 'pending': return !s.status;
    case 'approved': return s.status === 'approved';
    case 'rejected': return s.status === 'rejected';
    case 'commented': return s.comment && s.comment.trim() !== '';
    case 'override': return ad.type === 'override';
    case 'winner': return ad.type === 'winner';
  }
  return true;
}

function renderAds() {
  const container = document.getElementById('ads-container');
  container.innerHTML = '';

  const dayAds = ADS.filter(a => a.day === currentDay);
  const meta = DAYS_META.find(d => d.day === currentDay);

  // Day header
  const header = document.createElement('div');
  header.className = 'day-header';
  header.innerHTML = `
    <h2>${meta.label} — B13.${meta.day}</h2>
    <span class="cluster-tag">${escapeHtml(dayAds[0].cluster)}</span>
    <span class="date">${escapeHtml(dayAds[0].date)}</span>
  `;
  container.appendChild(header);

  const filteredAds = dayAds.filter(ad => matchesFilter(ad));

  if (filteredAds.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `
      <p style="font-size: 32px; margin-bottom: 12px;">∅</p>
      <p>Nenhum ad ${currentFilter === 'all' ? '' : 'neste filtro'} pro dia selecionado.</p>
      <p style="font-size: 13px; margin-top: 8px;">Clique em "Todos" pra ver todos os ${dayAds.length} ads deste dia.</p>
    `;
    container.appendChild(empty);
    return;
  }

  filteredAds.forEach(ad => {
    const card = renderCard(ad);
    container.appendChild(card);
  });
}

function renderCard(ad) {
  const s = state[ad.id] || {};
  const card = document.createElement('div');
  card.className = 'ad-card';
  card.id = `ad-${ad.id}`;
  if (s.status === 'approved') card.classList.add('approved');
  if (s.status === 'rejected') card.classList.add('rejected');
  if (s.comment && s.comment.trim() !== '') card.classList.add('has-comment');

  const typeBadge = ad.type === 'override'
    ? '<span class="badge override">Override</span>'
    : ad.type === 'winner'
    ? '<span class="badge winner">Winner Var</span>'
    : '<span class="badge fill">Fill</span>';

  card.innerHTML = `
    <div class="ad-header">
      <span class="ad-id">AD #${ad.id}</span>
      <span class="ad-title">${escapeHtml(ad.title)}</span>
      <div class="ad-badges">${typeBadge}</div>
    </div>
    <div class="ad-fields">
      <div class="ad-field"><span class="field-label">Ângulo</span><span class="field-value">${escapeHtml(ad.angle)}</span></div>
      <div class="ad-field"><span class="field-label">Copy Hook</span><span class="field-value hook">${escapeHtml(ad.hookCopy)}</span></div>
      <div class="ad-field"><span class="field-label">Visual Hook</span><span class="field-value">${escapeHtml(ad.hookVisual)}</span></div>
      <div class="ad-field"><span class="field-label">Formato</span><span class="field-value">${escapeHtml(ad.format)}</span></div>
      <div class="ad-field"><span class="field-label">Speaker</span><span class="field-value">${escapeHtml(ad.speaker)}</span></div>
      <div class="ad-field"><span class="field-label">Execução</span><span class="field-value execution">${escapeHtml(ad.execution)}</span></div>
    </div>
    <div class="action-bar">
      <button class="action-btn approve ${s.status === 'approved' ? 'active' : ''}" data-id="${ad.id}" data-action="approve">✓ Aprovar</button>
      <button class="action-btn reject ${s.status === 'rejected' ? 'active' : ''}" data-id="${ad.id}" data-action="reject">✗ Rejeitar</button>
      <button class="action-btn comment ${s.comment && s.comment.trim() !== '' ? 'active' : ''}" data-id="${ad.id}" data-action="toggle-comment">💬 Comentário${s.comment && s.comment.trim() !== '' ? ' ✓' : ''}</button>
      ${s.status ? `<span class="status-indicator ${s.status}">${s.status === 'approved' ? '✓ Aprovado' : '✗ Rejeitado'}</span>` : ''}
      <button class="action-btn reset" data-id="${ad.id}" data-action="reset">Limpar</button>
    </div>
    <div class="comment-box ${s.comment ? 'visible' : ''}" id="comment-box-${ad.id}">
      <textarea placeholder="O que precisa ser corrigido? Seja específico (hook copy, visual, mecanismo, etc.)" data-id="${ad.id}">${escapeHtml(s.comment || '')}</textarea>
      <div class="comment-hint">Pressione fora do campo pra salvar automaticamente.</div>
    </div>
  `;

  card.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', handleAction);
  });
  const textarea = card.querySelector('textarea');
  textarea.addEventListener('blur', (e) => {
    const id = parseInt(e.target.dataset.id);
    if (!state[id]) state[id] = {};
    const val = e.target.value.trim();
    if (val) {
      state[id].comment = val;
    } else {
      delete state[id].comment;
    }
    saveState();
    updateCardVisual(id);
  });

  return card;
}

function handleAction(e) {
  const id = parseInt(e.currentTarget.dataset.id);
  const action = e.currentTarget.dataset.action;
  if (!state[id]) state[id] = {};

  switch (action) {
    case 'approve':
      state[id].status = state[id].status === 'approved' ? null : 'approved';
      if (state[id].status === null) delete state[id].status;
      break;
    case 'reject':
      state[id].status = state[id].status === 'rejected' ? null : 'rejected';
      if (state[id].status === null) delete state[id].status;
      break;
    case 'toggle-comment':
      const box = document.getElementById(`comment-box-${id}`);
      box.classList.toggle('visible');
      if (box.classList.contains('visible')) {
        setTimeout(() => box.querySelector('textarea').focus(), 50);
      }
      return;
    case 'reset':
      delete state[id];
      break;
  }

  saveState();
  updateCardVisual(id);
}

function updateCardVisual(id) {
  const card = document.getElementById(`ad-${id}`);
  if (!card) return;
  const s = state[id] || {};
  card.classList.remove('approved', 'rejected', 'has-comment');
  if (s.status === 'approved') card.classList.add('approved');
  if (s.status === 'rejected') card.classList.add('rejected');
  if (s.comment && s.comment.trim() !== '') card.classList.add('has-comment');

  const approveBtn = card.querySelector('[data-action="approve"]');
  const rejectBtn = card.querySelector('[data-action="reject"]');
  const commentBtn = card.querySelector('[data-action="toggle-comment"]');
  approveBtn.classList.toggle('active', s.status === 'approved');
  rejectBtn.classList.toggle('active', s.status === 'rejected');
  const hasComment = !!(s.comment && s.comment.trim() !== '');
  commentBtn.classList.toggle('active', hasComment);
  commentBtn.innerHTML = `💬 Comentário${hasComment ? ' ✓' : ''}`;

  let statusEl = card.querySelector('.status-indicator');
  if (s.status && !statusEl) {
    const resetBtn = card.querySelector('[data-action="reset"]');
    const span = document.createElement('span');
    span.className = `status-indicator ${s.status}`;
    span.textContent = s.status === 'approved' ? '✓ Aprovado' : '✗ Rejeitado';
    resetBtn.before(span);
  } else if (!s.status && statusEl) {
    statusEl.remove();
  } else if (statusEl) {
    statusEl.className = `status-indicator ${s.status}`;
    statusEl.textContent = s.status === 'approved' ? '✓ Aprovado' : '✗ Rejeitado';
  }

  // Re-render if the card no longer matches filter
  if (!matchesFilter(ADS.find(a => a.id === id))) {
    setTimeout(() => renderAds(), 150);
  }
}

function updateStats() {
  let approved = 0, rejected = 0, commented = 0, pending = 0;
  ADS.forEach(ad => {
    const s = state[ad.id] || {};
    if (s.status === 'approved') approved++;
    else if (s.status === 'rejected') rejected++;
    else pending++;
    if (s.comment && s.comment.trim() !== '') commented++;
  });
  document.getElementById('count-approved').textContent = approved;
  document.getElementById('count-rejected').textContent = rejected;
  document.getElementById('count-commented').textContent = commented;
  document.getElementById('count-pending').textContent = pending;

  const reviewed = approved + rejected;
  document.getElementById('bottom-summary').textContent = `${reviewed} de 60 revisados · ${commented} com comentário`;

  document.getElementById('progress-approved').style.width = (approved / 60 * 100) + '%';
  document.getElementById('progress-rejected').style.width = (rejected / 60 * 100) + '%';
}

// ============ FILTERS ============
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderAds();
  });
});

// ============ EXPORT ============
function generateMarkdown() {
  let approved = [], rejected = [], commented = [], pending = [];
  ADS.forEach(ad => {
    const s = state[ad.id] || {};
    const entry = { ad, state: s };
    if (s.status === 'approved') approved.push(entry);
    else if (s.status === 'rejected') rejected.push(entry);
    else pending.push(entry);
    if (s.comment && s.comment.trim() !== '') commented.push(entry);
  });

  const today = new Date().toISOString().split('T')[0];
  let md = `# Review Feedback — Batch B13 / Week 2026-W17\n`;
  md += `**Gerado em:** ${today}\n`;
  md += `**Status:** ${approved.length} aprovados · ${rejected.length} rejeitados · ${commented.length} com comentário · ${pending.length} pendentes\n\n`;
  md += `---\n\n`;

  if (rejected.length > 0) {
    md += `## ✗ REJEITADOS (${rejected.length})\n\nAds que precisam ser refeitos ou removidos:\n\n`;
    rejected.forEach(({ ad, state: s }) => {
      md += `### AD #${ad.id} — ${ad.title}\n`;
      md += `**Dia:** ${ad.dayLabel} (B13.${ad.day}) · **Tipo:** ${ad.type}\n`;
      md += `**Copy Hook:** ${ad.hookCopy}\n`;
      if (s.comment && s.comment.trim() !== '') md += `**💬 Comentário:** ${s.comment}\n`;
      md += `\n`;
    });
    md += `---\n\n`;
  }

  if (commented.filter(e => e.state.status !== 'rejected').length > 0) {
    md += `## 💬 COM COMENTÁRIO (aprovados + pendentes com feedback)\n\n`;
    commented.filter(e => e.state.status !== 'rejected').forEach(({ ad, state: s }) => {
      md += `### AD #${ad.id} — ${ad.title}\n`;
      md += `**Dia:** ${ad.dayLabel} (B13.${ad.day}) · **Status:** ${s.status || 'pendente'}\n`;
      md += `**Copy Hook:** ${ad.hookCopy}\n`;
      md += `**💬 Comentário:** ${s.comment}\n\n`;
    });
    md += `---\n\n`;
  }

  if (approved.length > 0) {
    md += `## ✓ APROVADOS (${approved.length})\n\n`;
    approved.forEach(({ ad }) => {
      md += `- AD #${ad.id} — ${ad.title} (${ad.dayLabel})\n`;
    });
    md += `\n---\n\n`;
  }

  if (pending.length > 0) {
    md += `## ⏳ PENDENTES (${pending.length})\n\n`;
    pending.forEach(({ ad }) => {
      md += `- AD #${ad.id} — ${ad.title} (${ad.dayLabel})\n`;
    });
    md += `\n`;
  }

  return md;
}

function exportMarkdown() {
  const md = generateMarkdown();
  const today = new Date().toISOString().split('T')[0];
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `b13-review-feedback-${today}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

async function copyFeedback() {
  const md = generateMarkdown();
  try {
    await navigator.clipboard.writeText(md);
    alert('✓ Feedback copiado pro clipboard!');
  } catch (e) {
    alert('Erro ao copiar. Tenta exportar .md.');
  }
}

function resetAll() {
  if (!confirm('Isso vai apagar TODAS as aprovações, rejeições e comentários. Confirma?')) return;
  state = {};
  localStorage.removeItem(STORAGE_KEY);
  renderDayTabs();
  renderAds();
  updateStats();
}

// ============ INITIAL RENDER ============
renderDayTabs();
renderAds();
updateStats();
</script>
